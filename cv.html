<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Asif R. Porosh</title>
  <meta name="description" content="CV of Asif R. Porosh — Chief Operations Officer, telecom and platform operations." />

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f8f7f4;
      --ink:       #1a1a18;
      --ink-mid:   #4a4a46;
      --ink-light: #8a8a84;
      --rule:      #ddddd8;
      --sans:      'IBM Plex Sans', sans-serif;
      --mono:      'IBM Plex Mono', monospace;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 400;
      line-height: 1.65;
      min-height: 100vh;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ── Nav ── */
    nav {
      padding: 2rem 0 0;
    }

    .back {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .back:hover {
      color: var(--ink-mid);
    }

    /* ── CV scoped styles ── */
    #cv {
      padding: 2.5rem 0;
      border-bottom: 1px solid var(--rule);
    }

    #cv h1 {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    #cv h2 {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-light);
      font-weight: 400;
      margin-top: 2rem;
      margin-bottom: 1rem;
    }

    #cv h3 {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      margin-top: 1.5rem;
      margin-bottom: 0.15rem;
    }

    #cv h4 {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--ink-mid);
      margin-bottom: 0.1rem;
    }

    #cv p {
      font-size: 0.875rem;
      color: var(--ink-mid);
      line-height: 1.7;
      margin-bottom: 0.5rem;
    }

    #cv p em {
      font-style: italic;
      color: var(--ink-light);
    }

    #cv p strong {
      font-weight: 500;
      color: var(--ink);
    }

    #cv ul {
      list-style: none;
      padding: 0;
      margin: 0.4rem 0 0.8rem;
    }

    #cv ul li {
      font-size: 0.875rem;
      color: var(--ink-mid);
      line-height: 1.65;
      padding-left: 1rem;
      position: relative;
      margin-bottom: 0.25rem;
    }

    #cv ul li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--ink-light);
    }

    #cv a {
      color: var(--ink-mid);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      transition: border-color 0.15s ease, color 0.15s ease;
    }

    #cv a:hover {
      color: var(--ink);
      border-color: var(--ink-mid);
    }

    #cv hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 1.5rem 0;
    }

    /* ── Download ── */
    .download-wrap {
      padding: 2rem 0;
      border-bottom: 1px solid var(--rule);
    }

    .download-link {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1px;
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .download-link:hover {
      color: var(--ink-mid);
      border-color: var(--ink-mid);
    }

    /* ── Footer ── */
    footer {
      padding: 1.5rem 0 2.5rem;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .footer-copy, .footer-domain {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--ink-light);
      letter-spacing: 0.06em;
    }

    /* ── Animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    nav, #cv, .download-wrap, footer {
      animation: fadeUp 0.4s ease both;
    }

    nav            { animation-delay: 0.05s; }
    #cv            { animation-delay: 0.12s; }
    .download-wrap { animation-delay: 0.18s; }
    footer         { animation-delay: 0.22s; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      html { font-size: 15px; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <nav>
    <a class="back" href="/">← uraal.online</a>
  </nav>

  <div id="cv">
{
  "message": "Not Found",
  "documentation_url": "https://docs.github.com/rest/repos/contents#get-repository-content",
  "status": "404"
}
  </div>

  <div class="download-wrap">
    <a class="download-link" href="/cv.pdf" download>Download PDF</a>
  </div>

  <footer>
    <div class="footer-inner">
      <span class="footer-copy">© 2026 Asif R. Porosh</span>
      <span class="footer-domain">uraal.online</span>
    </div>
  </footer>

</div>

</body>
</html>
